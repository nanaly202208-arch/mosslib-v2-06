name: Deploy Main to Root

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout existing gh-pages branch (to preserve v2.2)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: _existing
          fetch-depth: 1
        continue-on-error: true

      - name: Build deployment directory
        shell: bash
        run: |
          mkdir -p _deploy
          # 复制当前 main 的 detail 内容到根目录
          cp -r detail/* _deploy/
          # 如果存在旧的 v2.2 目录，保留它
          if [ -d "_existing/v2.2" ]; then
            cp -r _existing/v2.2 _deploy/v2.2
          fi
          # 如果存在 .nojekyll 文件，保留它
          if [ -f "_existing/.nojekyll" ]; then
            cp _existing/.nojekyll _deploy/.nojekyll
          fi

      - name: Create .nojekyll (GitHub Pages needs this for underscore dirs)
        run: touch _deploy/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
          publish_branch: gh-pages
          force_orphan: true
